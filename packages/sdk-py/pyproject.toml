[project]
name = "agentmemory"
version = "0.1.0"
description = "Python SDK for AgentMemory — persistent memory for AI agents"
requires-python = ">=3.9"
dependencies = ["httpx>=0.27.0"]
license = {text = "MIT"}
keywords = ["agent", "memory", "ai", "llm", "sdk"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
