app = "agentstack-memory"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3002"
  HOST = "0.0.0.0"
  DATA_DIR = "/data"
  NODE_ENV = "production"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "memory_data"
  destination = "/data"

[checks]
  [checks.health]
    port = 3002
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
